# FolderForge - basic example config
#
# Minimal setup: one project, safe mode, stdio transport.
# Copy to your project root as `folderforge.yaml` (or pass via --config).

server:
  name: folderforge
  transport: stdio
  http:
    host: 127.0.0.1
    port: 7331
  dashboard:
    host: 127.0.0.1
    port: 7332
    # Optional: required when binding dashboard to a non-loopback host.
    # token: "put-a-long-random-string-here"

workspace:
  defaultProject: /home/devops/FolderForge
  allowedDirectories:
    - /home/devops/FolderForge
  deniedGlobs:
    - "**/.env"
    - "**/.env.*"
    - "**/*.pem"
    - "**/*.key"
    - "**/node_modules/**"

policy:
  defaultMode: safe
  requireApproval:
    - git_commit
    - git_push
    - file_delete
  blockedCommands:
    - "rm -rf /"
    - "git push --force"

# Trim the advertised tool list. Useful for clients that cap tools (~50).
# CLI flags (--tools-preset / --tools-groups / --tools-enable / --tools-disable)
# override anything set here. `workspace` tools are always kept.
tools:
  # Named group preset: vibe | readonly | full
  preset: vibe
  # Or pick groups explicitly (overrides preset):
  # enabledGroups: [file, search, terminal, git, code, build, process]
  # Add specific tools back on top of the filter:
  # enabled: [run_test]
  # Drop specific tools you don't want:
  # disabled: [search_ast]
