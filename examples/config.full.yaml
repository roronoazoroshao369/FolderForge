# FolderForge - full example config
#
# Exercises every configurable surface: HTTP transport, dev mode, git policy,
# terminal sandboxing, persisted approvals, and child-MCP adapters (Serena / Playwright / Desktop Commander).

server:
  name: folderforge
  transport: http
  http:
    host: 127.0.0.1
    port: 7331
    # Bearer token for the MCP HTTP endpoint. Required for non-loopback binds
    # (auto-generated and logged once if omitted). Send as `Authorization: Bearer <token>`.
    # token: "put-a-long-random-string-here"
    # Additional per-client API keys. Accepted via `Authorization: Bearer <key>`
    # OR `X-API-Key: <key>`, alongside the primary token above.
    # apiKeys:
    #   - "client-a-key"
    #   - "client-b-key"
    # Force auth even on a loopback bind. When true a credential MUST be set and
    # every request (including localhost) must present a valid one.
    # requireAuth: true
    # CORS allowlist. Use ["*"] to allow any origin; omit/empty to disable CORS.
    # corsOrigins:
    #   - https://your-tool.example.com
    # Idle session lifetime (ms) before the HTTP MCP session is rotated/expired.
    sessionTtlMs: 1800000
  dashboard:
    host: 127.0.0.1
    port: 7332
    # Optional: required when binding dashboard to a non-loopback host.
    # Requests must send `Authorization: Bearer <token>` or add `?token=<token>`.
    # token: "put-a-long-random-string-here"

workspace:
  defaultProject: /home/devops/FolderForge
  allowedDirectories:
    - /home/devops/FolderForge
    - /home/devops/FolderForge/tests/fixtures
  deniedGlobs:
    - "**/.env"
    - "**/.env.*"
    - "**/id_rsa"
    - "**/id_ed25519"
    - "**/*.pem"
    - "**/*.key"
    - "**/node_modules/**"
    - "**/.git/objects/**"

policy:
  # readonly | safe | dev | danger
  defaultMode: dev
  requireApproval:
    - git_push
    - git_commit
    - file_delete
    - db_write
    - shell_high_risk
    - docker_prune
  blockedCommands:
    - "rm -rf /"
    - "sudo rm"
    - "mkfs"
    - "dd if="
    - "chmod -R 777 /"
    - "curl * | bash"
    - "wget * | sh"
    - "git reset --hard"
    - "git push --force"
    - "docker system prune"
    - "kubectl delete"
    - "terraform apply"

terminal:
  shell: /bin/bash
  defaultTimeoutMs: 120000
  maxOutputBytes: 200000
  # redact | passthrough
  envPolicy: redact

git:
  # approval | allow | deny
  allowCommit: approval
  allowPush: approval
  allowResetHard: false

# Tool surface control. `vibe-lite` selects a folder-scoped coding tool set and
# hard-caps it to 50 tools. With the code change in src/tools/index.ts, this
# preset drops the whole workspace_* group (no activate/switch/route/onboard),
# since the agent is pinned to the folders in workspace.allowedDirectories.
tools:
  preset: vibe-lite

# Per-tool rate limiting and quotas. Sliding window (maxCalls / windowMs) plus an
# optional rolling 24h dailyQuota. Denied or approval-gated calls don't consume quota.
rateLimit:
  enabled: true
  default:
    maxCalls: 60
    windowMs: 10000
  overrides:
    shell_exec:
      maxCalls: 20
      windowMs: 10000
      dailyQuota: 1000
    git_push:
      maxCalls: 5
      windowMs: 60000
      dailyQuota: 50

# Secret scanning. Beyond the built-in regex rules, entropy detection flags
# bespoke high-entropy tokens (minEntropy is bits/char; minLength is the
# shortest token considered).
secretScan:
  entropyEnabled: true
  minEntropy: 4.0
  minLength: 20

adapters:
  serena:
    enabled: false
    command: serena
    args: []
  playwright:
    enabled: true
    command: npx
    args:
      - "-y"
      - "@playwright/mcp@0.0.41"
  desktopCommander:
    enabled: false
    command: npx
    args:
      - "-y"
      - "@wonderwhy-er/desktop-commander@latest"
