name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to release (for example v2.3.2)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish-github-release:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out tagged source
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: 22

      - name: Verify tag, clean tree, package version, changelog, and exact commit
        run: node scripts/verify-release-ref.mjs --tag "${RELEASE_TAG}" --notes-file "${RUNNER_TEMP}/release-notes.md"

      - name: Create GitHub release for verified tag
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"

          if gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "GitHub release ${RELEASE_TAG} already exists."
            exit 0
          fi

          gh release create "${RELEASE_TAG}" \
            --repo "${GITHUB_REPOSITORY}" \
            --verify-tag \
            --title "FolderForge ${version}" \
            --notes-file "${RUNNER_TEMP}/release-notes.md" \
            --latest
