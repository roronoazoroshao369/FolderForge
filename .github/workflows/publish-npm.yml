name: publish-npm

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing semantic version tag to publish (for example v2.4.0)
        required: true
        type: string

permissions:
  contents: read
  id-token: write
  attestations: write
  artifact-metadata: write

concurrency:
  group: npm-publish-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    env:
      RELEASE_TAG: ${{ inputs.tag }}
    steps:
      - name: Check out exact tag
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - name: Set up Node for npm OIDC
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: '24'
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Pin trusted-publishing-capable npm
        run: npm install --global npm@12.0.1

      - name: Verify publishing toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          test "$(node -p "process.versions.node.split('.')[0]")" -ge 24
          npm_version="$(npm --version)"
          node -e "const [major, minor] = process.argv[1].split('.').map(Number); if (major < 11 || (major === 11 && minor < 5)) process.exit(1)" "${npm_version}"

      - name: Install without lifecycle execution
        run: npm ci --ignore-scripts

      - name: Verify tag, package version, clean tree, and release notes
        run: node scripts/verify-release-ref.mjs --tag "${RELEASE_TAG}" --notes-file "${RUNNER_TEMP}/release-notes.md"

      - name: Run complete release gate
        run: npm run release:check

      - name: Refuse an already-published version
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            echo "${package_name}@${package_version} already exists on npm." >&2
            exit 1
          fi

      - name: Pack the exact publish artifact
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          pack_json="$(npm pack --json --ignore-scripts)"
          tarball="$(node -e "const value=JSON.parse(process.argv[1]); if (!Array.isArray(value) || !value[0]?.filename) process.exit(1); process.stdout.write(value[0].filename)" "${pack_json}")"
          test -f "${tarball}"
          echo "filename=${tarball}" >> "${GITHUB_OUTPUT}"
          echo "path=${GITHUB_WORKSPACE}/${tarball}" >> "${GITHUB_OUTPUT}"

      - name: Generate CycloneDX SBOM
        run: npm sbom --sbom-format cyclonedx --sbom-type library > "${RUNNER_TEMP}/folderforge.cdx.json"

      - name: Attest tarball build provenance
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: ${{ steps.pack.outputs.path }}

      - name: Attest tarball SBOM
        uses: actions/attest@36051bcae73b7c2a8a6945a48cbf80953c6baa35 # v4
        with:
          subject-path: ${{ steps.pack.outputs.path }}
          sbom-path: ${{ runner.temp }}/folderforge.cdx.json

      - name: Upload review artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: npm-release-${{ inputs.tag }}
          if-no-files-found: error
          retention-days: 30
          path: |
            ${{ steps.pack.outputs.path }}
            ${{ runner.temp }}/folderforge.cdx.json
            ${{ runner.temp }}/release-notes.md

      - name: Publish exact attested tarball with npm OIDC
        run: npm publish "${{ steps.pack.outputs.path }}" --access public

      - name: Verify registry state
        shell: bash
        run: |
          set -euo pipefail
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          published="$(npm view "${package_name}@${package_version}" version)"
          test "${published}" = "${package_version}"
