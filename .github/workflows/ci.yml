name: ci

# Roadmap Q9: run lint + typecheck + tests (incl. the schema-lock guard) on
# every push and PR so accidental tool-surface changes are caught before merge.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Test (includes schema-lock guard)
        run: npm test
