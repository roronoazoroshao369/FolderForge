name: ci

on:
  push:
    branches: [main, 'feat/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  compatibility:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22, 24]

    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - name: Set up Node
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies without lifecycle downloads
        run: npm ci --ignore-scripts

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Architecture boundaries
        run: npm run architecture:check

      - name: Documentation and version checks
        run: npm run docs:check

      - name: Audit durability failure injection
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: |
          node -e "require('node:fs').mkdirSync('.folderforge-ci', { recursive: true })"
          npx vitest run tests/unit/audit-durability.test.ts --reporter=json --outputFile=.folderforge-ci/audit-durability.json

      - name: Preserve audit durability evidence
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: audit-durability-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: .folderforge-ci/audit-durability.json

      - name: Evidence integrity and release provenance corpus
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npx vitest run tests/unit/evidence-store.test.ts tests/unit/release-integrity.test.ts tests/unit/release-provenance.test.ts --reporter=json --outputFile=.folderforge-ci/evidence-integrity.json

      - name: Preserve evidence integrity results
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: evidence-integrity-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: .folderforge-ci/evidence-integrity.json

      - name: Test
        run: npm test

      - name: Coverage regression gate
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run test:coverage

      - name: Property and fuzz checks
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run test:fuzz

      - name: Child MCP heartbeat stress
        if: matrix.node == 22 && (matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest')
        env:
          FOLDERFORGE_STRESS_RUNS: '25'
        run: npm run test:stress

      - name: Build
        run: npm run build

      - name: Child MCP compatibility corpus
        if: matrix.node == 22
        run: node scripts/child-mcp-compatibility.mjs --output .folderforge-ci/child-mcp-compatibility.json

      - name: Preserve child MCP compatibility evidence
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: child-mcp-compatibility-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: .folderforge-ci/child-mcp-compatibility.json

      - name: Concurrent audit writer stress
        if: matrix.node == 22
        run: npm run test:audit-concurrency

      - name: Evidence migration and tamper smoke
        if: matrix.node == 22
        run: node scripts/smoke-evidence.mjs

      - name: Five-minute onboarding smoke
        if: matrix.node == 22
        run: node scripts/smoke-onboarding.mjs

      - name: Godot adapter package smoke
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm run smoke:adapter-godot

      - name: Governance microbenchmark
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: node scripts/run-governance-benchmarks.mjs --output .folderforge-ci/local-governance.json

      - name: Preserve governance benchmark evidence
        if: always() && matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: governance-benchmark-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 14
          path: .folderforge-ci/local-governance.json

      - name: MCP Inspector conformance
        if: matrix.node == 22 && (matrix.os == 'ubuntu-latest' || matrix.os == 'windows-latest')
        run: node scripts/smoke-inspector.mjs

      - name: Pack, install tarball, and smoke CLI
        run: npm run smoke:package

      - name: Smoke stdio MCP with spaces and Unicode
        run: npm run smoke:stdio

      - name: Smoke authenticated HTTP MCP
        run: npm run smoke:http

      - name: Production dependency audit
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm audit --omit=dev

      - name: Full dependency audit
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        run: npm audit
