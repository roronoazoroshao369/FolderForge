name: Feature request
description: Propose a user problem or capability
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes: {label: Problem to solve}
    validations: {required: true}
  - type: textarea
    id: proposal
    attributes: {label: Proposed behavior}
    validations: {required: true}
  - type: textarea
    id: safety
    attributes: {label: Security, compatibility, and packaging considerations}
