name: Beta feedback
description: Report a FolderForge beta installation, compatibility, reliability, or usability issue.
title: "[Beta]: "
labels: [beta]
body:
  - type: markdown
    attributes:
      value: |
        Do not include credentials, proprietary source, raw audit logs, or unredacted screenshots. Security vulnerabilities must be reported privately under SECURITY.md.
  - type: input
    id: version
    attributes:
      label: FolderForge version and commit
      placeholder: "2.4.0-beta.1 / abcdef123456"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options: [Ubuntu/Linux, macOS, Windows, Other]
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v22.23.1"
    validations:
      required: true
  - type: input
    id: client
    attributes:
      label: MCP client and version
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options: [Install/upgrade, MCP connection, Child adapter, Policy/approval, Plugin/sandbox, Artifact/visual/a11y, Workflow, Documentation, Other]
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Minimal reproduction
      description: Include exact commands and a disposable fixture when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior and redacted evidence
    validations:
      required: true
  - type: textarea
    id: doctor
    attributes:
      label: Redacted doctor findings
      description: Include only relevant findings; remove paths or data you do not want public.
  - type: checkboxes
    id: privacy
    attributes:
      label: Safety confirmation
      options:
        - label: I removed credentials, private source, tokens, cookies, and personal data.
          required: true
        - label: This is not a confidential security vulnerability.
          required: true
